name: Example GPU CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: read

env:
  WHEEL_TAG: manylinux_2_28_x86_64

jobs:
  build-wheel:
    name: Build wheel
    runs-on: ubuntu-latest
    container:
      # Use a modified version of nvidia/cuda container
      image: ghcr.io/gpu-ci-demo/example_gpu_ci:cuda_build
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.2
      - run: python -m build -v --wheel
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-wheel
          path: dist/example-*.whl

  patch-wheel:
    # Patch the Python wheel so that it's compliant with manylinux standard
    name: Patch wheel using auditwheel
    needs: build-wheel
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - name: Pick Python
        run: |
          export PATH=/opt/python/cp310-cp310/bin/:$PATH
          echo ${PATH} >> $GITHUB_PATH
      - name: Install dependencies
        run: |
          pip install wheel auditwheel
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-wheel
      - name: Patch wheel
        run: |
          auditwheel repair --only-plat --plat ${{ env.WHEEL_TAG }} example-*.whl
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-wheel-patched
          path: wheelhouse/example-*.whl
